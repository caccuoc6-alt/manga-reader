<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Read manga on SkibidiToiletArchive — vertical scroll reader." />
  <title>Reader — SkibidiToiletArchive</title>
  <link rel="stylesheet" href="./css/style.css" />
  <style>
    /* Reader-specific overrides */
    body { background: #050505; }

    .reader-controls {
      position: fixed;
      bottom: 28px;
      right: 28px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 50;
    }
    .reader-fab {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(124,58,237,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(168,85,247,0.4);
      color: #fff;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(124,58,237,0.5);
    }
    .reader-fab:hover { transform: scale(1.1); background: var(--accent-primary); }

    /* Manga detail panel */
    .detail-panel {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px var(--gap-lg) 0;
    }
    .detail-panel .manga-detail-tags { margin-top: 8px; }

    /* Chapter sidebar on reader */
    .chapter-sidebar {
      position: fixed;
      top: 56px;
      right: 0;
      width: 280px;
      height: calc(100vh - 56px);
      background: rgba(10,10,15,0.95);
      backdrop-filter: blur(16px);
      border-left: 1px solid var(--border-subtle);
      overflow-y: auto;
      z-index: 80;
      padding: var(--gap-md);
      transform: translateX(100%);
      transition: transform 0.3s ease;
    }
    .chapter-sidebar.open { transform: translateX(0); }
    .chapter-sidebar-title { font-weight: 700; margin-bottom: var(--gap-md); font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; }
    .chapter-sidebar-item {
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
      transition: all 0.15s;
      margin-bottom: 4px;
      color: var(--text-secondary);
    }
    .chapter-sidebar-item:hover { background: var(--bg-elevated); color: var(--text-primary); }
    .chapter-sidebar-item.active { background: rgba(124,58,237,0.2); color: var(--accent-secondary); border: 1px solid var(--border-default); }

    /* Delete confirm styling */
    #delete-modal { display: none; }
  </style>
</head>
<body class="reader-page">

<!-- Reading progress bar -->
<div class="progress-bar" id="progress-bar" style="width:0"></div>

<!-- Reader Navbar -->
<header class="reader-navbar" id="reader-navbar">
  <div class="reader-navbar-inner">
    <a href="./index.html" class="nav-link" id="back-btn" style="display:flex;align-items:center;gap:6px;font-size:0.85rem">
      ← Library
    </a>

    <div style="display:flex;flex-direction:column;align-items:center;flex:1;overflow:hidden">
      <div class="reader-title" id="reader-manga-title" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:300px"></div>
      <div id="reader-chapter-name" style="font-size:0.75rem;color:var(--text-muted)"></div>
    </div>

    <div style="display:flex;align-items:center;gap:8px">
      <select class="reader-chapter-select" id="chapter-select" title="Switch chapter">
        <option>Loading…</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="chapters-toggle-btn" title="Chapter list">☰</button>
    </div>
  </div>
</header>

<!-- Chapter Sidebar -->
<aside class="chapter-sidebar" id="chapter-sidebar">
  <div class="chapter-sidebar-title">Chapters</div>
  <div id="sidebar-chapters"></div>
</aside>

<!-- Detail Info (above pages) -->
<div class="detail-panel" id="detail-panel"></div>

<!-- Pages Container -->
<div class="reader-container" id="reader-container">
  <div class="flex-center" style="padding:60px 0" id="loading-state">
    <div class="spinner"></div>
  </div>
</div>

<!-- End of chapter UI -->
<div class="reader-end hidden" id="reader-end">
  <h3>🎉 End of Chapter</h3>
  <p id="reader-end-text">You've finished reading</p>
  <div style="display:flex;gap:12px;justify-content:center;margin-top:20px;flex-wrap:wrap" id="reader-end-actions"></div>
</div>

<!-- Floating Controls -->
<div class="reader-controls">
  <button class="reader-fab" id="fab-top"    title="Back to top">↑</button>
  <button class="reader-fab" id="fab-prev"   title="Previous chapter">‹</button>
  <button class="reader-fab" id="fab-next"   title="Next chapter">›</button>
  <button class="reader-fab" id="fab-settings" title="Settings" style="font-size:0.9rem">⚙</button>
</div>

<!-- Settings modal -->
<div class="modal-backdrop hidden" id="settings-modal">
  <div class="modal">
    <h2 class="modal-title">⚙ Reader Settings</h2>
    <div class="form-group">
      <label class="form-label">Image Width</label>
      <input type="range" id="img-width-range" min="50" max="100" value="100" style="width:100%" />
      <div style="text-align:center;font-size:0.8rem;color:var(--text-muted)" id="img-width-label">100%</div>
    </div>
    <div class="form-group">
      <label class="form-label">Page Gap</label>
      <input type="range" id="gap-range" min="0" max="40" value="3" style="width:100%" />
      <div style="text-align:center;font-size:0.8rem;color:var(--text-muted)" id="gap-label">3px</div>
    </div>
    <div class="form-group">
      <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer">
        <input type="checkbox" id="dark-bg-toggle" checked /> Dark background between pages
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="close-settings-btn">Done</button>
    </div>
  </div>
</div>

<!-- Delete modal (admin) -->
<div class="modal-backdrop hidden" id="delete-modal">
  <div class="modal">
    <h2 class="modal-title">🗑 Delete Manga?</h2>
    <p style="color:var(--text-secondary)">This will permanently delete this manga and all its chapters. This cannot be undone.</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" id="cancel-delete-btn">Cancel</button>
      <button class="btn btn-danger" id="confirm-delete-btn">Delete</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>

<script src="./js/api.js"></script>
<script>
// ─── State ─────────────────────────────────────────────────────────────────────
const params    = new URLSearchParams(window.location.search);
const mangaId   = params.get('id');
const initChap  = parseInt(params.get('ch')) || 1;
let manga       = null;
let currentChap = null;

if (!mangaId) window.location.href = './index.html';

// ─── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadCurrentUser();
  await loadManga();
})();

// ─── Load manga data ───────────────────────────────────────────────────────────
async function loadManga() {
  try {
    const data = await API.get(`/api/manga/${mangaId}`);
    manga = data.manga;

    document.title = `${manga.title} — SkibidiToiletArchive`;
    document.getElementById('reader-manga-title').textContent = manga.title;

    renderDetailPanel();
    buildChapterSelect();
    buildSidebar();

    // Select chapter from URL or default to 1st
    const chapIdx = manga.chapters.findIndex(c => c.chapterNumber === initChap);
    loadChapter(chapIdx >= 0 ? chapIdx : 0);
  } catch (err) {
    document.getElementById('reader-container').innerHTML = `
      <div class="empty-state"><div class="empty-state-icon">⚠️</div>
      <h3>Failed to load manga</h3><p>${err.message}</p>
      <a href="./index.html" class="btn btn-primary" style="margin-top:16px">← Go Back</a></div>`;
  }
}

// ─── Detail Panel ─────────────────────────────────────────────────────────────
function renderDetailPanel() {
  const avg = manga.rating?.count > 0
    ? (manga.rating.total / manga.rating.count).toFixed(1) : '—';

  const tags = (manga.genres || []).map(g => `<span class="tag">${escHtml(g)}</span>`).join('');

  document.getElementById('detail-panel').innerHTML = `
    <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;padding-bottom:24px;border-bottom:1px solid var(--border-subtle)">
      <div style="flex-shrink:0">
        ${manga.coverImage
          ? `<img src="${manga.coverImage}" alt="${escHtml(manga.title)}"
                  style="width:120px;aspect-ratio:2/3;object-fit:cover;border-radius:12px;border:2px solid var(--border-default);box-shadow:var(--shadow-glow)" />`
          : `<div style="width:120px;aspect-ratio:2/3;background:var(--bg-elevated);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.5rem">📖</div>`
        }
      </div>
      <div style="flex:1;min-width:200px">
        <h1 style="font-size:1.6rem;font-weight:900;margin-bottom:4px">${escHtml(manga.title)}</h1>
        <div style="color:var(--accent-secondary);font-weight:600;margin-bottom:8px">${escHtml(manga.author || 'Unknown')}</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">
          <span class="manga-card-badge ${statusClass(manga.status)}" style="position:static;font-size:0.75rem;padding:3px 10px">${manga.status}</span>
          ${tags}
        </div>
        <p style="color:var(--text-secondary);font-size:0.9rem;line-height:1.7;margin-bottom:16px;max-width:600px">${escHtml(manga.description || 'No description.')}</p>
        <div style="display:flex;gap:24px;flex-wrap:wrap">
          <div class="stat-item"><div class="stat-value">${manga.chapters?.length || 0}</div><div class="stat-label">Chapters</div></div>
          <div class="stat-item"><div class="stat-value">${(manga.views||0).toLocaleString()}</div><div class="stat-label">Views</div></div>
          <div class="stat-item"><div class="stat-value">⭐ ${avg}</div><div class="stat-label">Rating</div></div>
          <div class="stat-item"><div class="stat-value">${formatDate(manga.createdAt)}</div><div class="stat-label">Added</div></div>
        </div>

        <!-- Rating widget -->
        <div style="margin-top:16px;display:flex;align-items:center;gap:12px">
          <span style="font-size:0.85rem;color:var(--text-muted)">Rate:</span>
          <div class="stars" id="rating-stars">
            ${[1,2,3,4,5].map(n => `<span class="star" data-v="${n}" role="button" tabindex="0">★</span>`).join('')}
          </div>
        </div>

        ${(isAdmin() || (currentUser && manga.uploadedBy?._id === currentUser?.id)) ? `
        <div style="margin-top:16px;display:flex;gap:8px">
          <button class="btn btn-danger btn-sm" id="delete-manga-btn">🗑 Delete Manga</button>
          <a href="./upload.html" class="btn btn-ghost btn-sm">➕ Add Chapter</a>
        </div>` : ''}
      </div>
    </div>
  `;

  // Stars
  const stars = document.querySelectorAll('#rating-stars .star');
  stars.forEach(star => {
    star.addEventListener('mouseover', () => {
      const v = +star.dataset.v;
      stars.forEach(s => s.classList.toggle('filled', +s.dataset.v <= v));
    });
    star.addEventListener('mouseleave', () => stars.forEach(s => s.classList.remove('filled')));
    star.addEventListener('click', async () => {
      try {
        await API.post(`/api/manga/${mangaId}/rate`, { rating: star.dataset.v });
        toast.success('Rating submitted! ⭐');
      } catch (err) { toast.error(err.message); }
    });
  });

  // Delete
  document.getElementById('delete-manga-btn')?.addEventListener('click', () => {
    document.getElementById('delete-modal').classList.remove('hidden');
  });
}

function statusClass(s) {
  return { ongoing:'badge-ongoing', completed:'badge-completed', hiatus:'badge-hiatus' }[s] || '';
}

// ─── Delete Manga ─────────────────────────────────────────────────────────────
document.getElementById('cancel-delete-btn').addEventListener('click', () => {
  document.getElementById('delete-modal').classList.add('hidden');
});
document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
  try {
    await API.delete(`/api/manga/${mangaId}`);
    toast.success('Manga deleted.');
    setTimeout(() => window.location.href = './index.html', 800);
  } catch (err) { toast.error(err.message); }
});

// ─── Chapter Select ────────────────────────────────────────────────────────────
function buildChapterSelect() {
  const sel = document.getElementById('chapter-select');
  sel.innerHTML = '';
  if (!manga.chapters?.length) {
    sel.innerHTML = '<option>No chapters</option>';
    return;
  }
  manga.chapters.forEach((ch, i) => {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = `Ch.${ch.chapterNumber} — ${ch.title || 'Chapter ' + ch.chapterNumber}`;
    sel.appendChild(o);
  });
  sel.addEventListener('change', e => loadChapter(+e.target.value));
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function buildSidebar() {
  const sb = document.getElementById('sidebar-chapters');
  sb.innerHTML = '';
  (manga.chapters || []).forEach((ch, i) => {
    const div = document.createElement('div');
    div.className = 'chapter-sidebar-item';
    div.textContent = `Ch.${ch.chapterNumber} — ${ch.title || 'Chapter ' + ch.chapterNumber}`;
    div.dataset.idx = i;
    div.addEventListener('click', () => {
      loadChapter(i);
      document.getElementById('chapter-sidebar').classList.remove('open');
    });
    sb.appendChild(div);
  });
}

function updateSidebarActive(idx) {
  document.querySelectorAll('.chapter-sidebar-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
}

// ─── Load Chapter ─────────────────────────────────────────────────────────────
function loadChapter(idx) {
  if (!manga.chapters?.length) {
    document.getElementById('reader-container').innerHTML = `
      <div class="empty-state"><div class="empty-state-icon">📭</div>
      <h3>No chapters uploaded yet</h3>
      ${isLoggedIn() ? `<a href="./upload.html" class="btn btn-primary" style="margin-top:16px">Upload Chapter</a>` : ''}</div>`;
    return;
  }

  const chapData = manga.chapters[idx];
  if (!chapData) return;

  currentChap = { data: chapData, idx };

  // Update URL silently
  history.replaceState({}, '', `?id=${mangaId}&ch=${chapData.chapterNumber}`);

  // Update header
  document.getElementById('chapter-select').value = idx;
  document.getElementById('reader-chapter-name').textContent =
    `Ch.${chapData.chapterNumber}${chapData.title ? ' — ' + chapData.title : ''}`;

  updateSidebarActive(idx);
  renderPages(chapData, idx);
}

// ─── Render Pages with IntersectionObserver lazy loading ──────────────────────
function renderPages(chapData, chapIdx) {
  const container = document.getElementById('reader-container');
  document.getElementById('loading-state')?.remove();
  document.getElementById('reader-end').classList.add('hidden');

  container.innerHTML = '';

  if (!chapData.pages?.length) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div><h3>This chapter has no pages</h3></div>`;
    return;
  }

  const gap = parseInt(localStorage.getItem('reader-gap') || 3);
  const width = localStorage.getItem('reader-width') || '100';

  chapData.pages.forEach((page, i) => {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = `margin-bottom:${gap}px;`;

    const img = document.createElement('img');
    img.className = 'reader-page-img lazy';
    img.alt = `Page ${i + 1}`;
    img.dataset.src = page.url;
    img.style.width = `${width}%`;
    img.style.margin = '0 auto';

    img.addEventListener('load', () => img.classList.add('loaded'));
    img.addEventListener('error', () => {
      img.style.cssText += ';min-height:60px;background:var(--bg-elevated)';
      img.alt = `⚠ Page ${i + 1} failed to load`;
    });

    wrapper.appendChild(img);
    container.appendChild(wrapper);
  });

  // End of chapter marker
  const end = document.getElementById('reader-end');
  const endText = document.getElementById('reader-end-text');
  const endActions = document.getElementById('reader-end-actions');

  endText.textContent = `You've finished Chapter ${chapData.chapterNumber}!`;
  endActions.innerHTML = '';

  if (chapIdx > 0) {
    const prevBtn = document.createElement('button');
    prevBtn.className = 'btn btn-ghost';
    prevBtn.textContent = '← Previous Chapter';
    prevBtn.onclick = () => loadChapter(chapIdx - 1);
    endActions.appendChild(prevBtn);
  }

  const homeBtn = document.createElement('a');
  homeBtn.className = 'btn btn-ghost';
  homeBtn.href = '/';
  homeBtn.textContent = '📚 Library';
  endActions.appendChild(homeBtn);

  if (chapIdx < manga.chapters.length - 1) {
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn btn-primary';
    nextBtn.textContent = 'Next Chapter →';
    nextBtn.onclick = () => loadChapter(chapIdx + 1);
    endActions.appendChild(nextBtn);
  }

  // IntersectionObserver for lazy load
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        if (img.dataset.src) {
          img.src = img.dataset.src;
          delete img.dataset.src;
          observer.unobserve(img);
        }
      }
    });
  }, { rootMargin: '400px' });

  container.querySelectorAll('img.lazy').forEach(img => observer.observe(img));

  // Show end section once scrolled to bottom
  const pageObserver = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) {
      end.classList.remove('hidden');
      pageObserver.disconnect();
    }
  }, { threshold: 0.5 });

  const lastPage = container.lastElementChild;
  if (lastPage) pageObserver.observe(lastPage);

  // Scroll to top
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Reading Progress Bar ─────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const docH = document.documentElement.scrollHeight - window.innerHeight;
  const pct  = docH > 0 ? (window.scrollY / docH) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
});

// ─── FABs ─────────────────────────────────────────────────────────────────────
document.getElementById('fab-top').addEventListener('click', () =>
  window.scrollTo({ top: 0, behavior: 'smooth' }));

document.getElementById('fab-prev').addEventListener('click', () => {
  if (currentChap && currentChap.idx > 0) loadChapter(currentChap.idx - 1);
  else toast.info('Already on the first chapter.');
});

document.getElementById('fab-next').addEventListener('click', () => {
  if (currentChap && currentChap.idx < manga.chapters.length - 1) loadChapter(currentChap.idx + 1);
  else toast.info('No more chapters yet.');
});

// ─── Settings Modal ───────────────────────────────────────────────────────────
document.getElementById('fab-settings').addEventListener('click', () => {
  document.getElementById('settings-modal').classList.remove('hidden');
  document.getElementById('img-width-range').value = localStorage.getItem('reader-width') || 100;
  document.getElementById('gap-range').value = localStorage.getItem('reader-gap') || 3;
  updateSettingsLabels();
});

document.getElementById('close-settings-btn').addEventListener('click', () => {
  document.getElementById('settings-modal').classList.add('hidden');
  if (currentChap) loadChapter(currentChap.idx);
});

document.getElementById('settings-modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
});

['img-width-range', 'gap-range'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => {
    localStorage.setItem('reader-width', document.getElementById('img-width-range').value);
    localStorage.setItem('reader-gap', document.getElementById('gap-range').value);
    updateSettingsLabels();
  });
});

function updateSettingsLabels() {
  document.getElementById('img-width-label').textContent = document.getElementById('img-width-range').value + '%';
  document.getElementById('gap-label').textContent = document.getElementById('gap-range').value + 'px';
}

// ─── Chapter Sidebar Toggle ────────────────────────────────────────────────────
document.getElementById('chapters-toggle-btn').addEventListener('click', () => {
  document.getElementById('chapter-sidebar').classList.toggle('open');
});

// Close sidebar on outside click
document.addEventListener('click', (e) => {
  const sidebar = document.getElementById('chapter-sidebar');
  const toggleBtn = document.getElementById('chapters-toggle-btn');
  if (!sidebar.contains(e.target) && e.target !== toggleBtn) {
    sidebar.classList.remove('open');
  }
});

// Keyboard navigation (arrow keys)
document.addEventListener('keydown', (e) => {
  if (!currentChap) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
    if (currentChap.idx < manga.chapters.length - 1) loadChapter(currentChap.idx + 1);
  } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
    if (currentChap.idx > 0) loadChapter(currentChap.idx - 1);
  }
});
</script>
</body>
</html>
